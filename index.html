<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — WebHanger</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#030712; }
    a { text-decoration:none; }
  </style>
</head>
<body>
  <div data-wh-topnav></div>
  
  <div data-wh-hero></div>
  <div data-wh-features></div>

  <div data-wh-footer></div>
  
  <script src="https://unpkg.com/webhanger-front@latest/browser.min.js"></script>
  <script>
    async function whInit(pageComponents) {
      const res = await fetch("./wh-manifest.json");
      const m = await res.json();
      await WebHangerFront.clearCache();
      for (const [name, selector] of Object.entries(pageComponents)) {
        const c = m.components[name];
        if (c) await WebHangerFront.load(c.url, m.pid, c.token, c.expires, selector);
      }
    }
  </script>

  <script>
    whInit({"topnav":"[data-wh-topnav]","hero":"[data-wh-hero]","features":"[data-wh-features]","footer":"[data-wh-footer]"});
  </script>
</body>
</html>
